<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fashion Central</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ingrid+Darling&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playwrite+NZ+Guides&family=Princess+Sofia&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>

  <!--  HEADER -->
  <header class="header">
    <h1 class="logo">Fashion Central</h1>
    <p class="subtitle">Your Digital Wardrobe Studio.</p>
  </header>


  <!--  SEARCH + FILTER -->
  <section class="top-controls">

    <div class="search-bar">
      <label for="searchInput">Search:</label>
      <input id="searchInput" type="text" />
    </div>

  <div class="sortNameBtn-section">
 <button id="sortNameBtn">Sort A-Z</button>
</div>

    <div class="filters">
      <span>Filter</span>
      <button data-filter="all">all</button>
      <button data-filter="tops">tops</button>
      <button data-filter="bottoms">bottoms</button>
      <button data-filter="shoes">shoes</button>
    </div>

  </section>

  

  <!--  MAIN LAYOUT -->
  <div class="app-container">

    <!--  LEFT: WARDROBE GRID -->
    <main id="wardrobeGrid" class="wardrobe-grid">
    </main>
    <!--  RIGHT: OUTFIT BUILDER -->
    <aside class="sidebar">

      <h2>Outfit Builder</h2>
      <p>Drop items here</p>

      <!-- selected stuff appears here -->
      <div id="outfitArea" class="outfit-area">
        <div class="outfit-item">
          <div class="outfit-image"></div>
          <p>Item name</p>
        </div>

        <div class="outfit-item">
          <div class="outfit-image"></div>
          <p>Item name</p>
        </div>
        

      </div>

      <!-- outfit name -->
      <div class="outfit-name">
        <label>Outfit name:</label>
        <input id="outfitName" type="text" />
      </div>

      <!-- buttons -->
      <button id="saveOutfitBtn">Save Outfit</button>
      <button id="clearOutfitBtn">Clear</button>

      <section class="saved-outfits-section">
    <h3>Saved Outfits</h3>
    <div id="savedOutfitsGrid" class="saved-outfits-grid"></div>
  </section>

    </aside>

   <section class="inspo-section">
  <h2>Inspo Board</h2>
  <button id="loadInspoBtn">Load Inspiration</button>
  <div id="inspoGrid" class="inspo-grid"></div>
</section>
    
  </div>


    <div id="modal" class="modal hidden">

    <div class="modal-content">
      <h2>Add New Item</h2>

      <input id="itemName" placeholder="Name" />
      
      <select id="itemCategory">
        <option value="tops">Tops</option>
        <option value="bottoms">Bottoms</option>
        <option value="shoes">Shoes</option>
        <option value="outerwear">Outerwear</option>
        <option value="accessories">Accessories</option>
      </select>

      <input id="itemColor" placeholder="Color" />
      <input id="itemImage" placeholder="Image URL" />
      <input id="itemTags" placeholder="Tags (comma separated)" />

      <button id="saveItemBtn">Save Item</button>
      <button id="closeModalBtn">Close</button>
    </div>

  </div>


  <script src="script.js"></script>

</body>
</html>
